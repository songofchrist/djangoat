<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/default.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/night-owl.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/django.min.js"></script>
    <style>
      .examples td:first-child { padding: 0 }
      .examples td:last-child { padding: 0 0.8em }
      .func { background: #555; color: white; margin: 0; padding: 10px 15px }
      .func + div { background: #eee; font-family: monospace; font-size: 1.2em; line-height: 2; padding: 10px 15px}
      .mono { background: #eee; display: inline-block; font-family: monospace; padding: 5px 8px }
      pre { margin: 0 }
    </style>
  </head>
  <body>
    {% block body %}{% endblock %}
    <script>hljs.highlightAll()</script>
  </body>
</html>
